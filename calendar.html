<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar – GBGS Opening Checklist</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="topnav">
    <a class="topnav-brand" href="index.html">GBGS OPENING CHECKLIST</a>
  </nav>
  <div class="grad-bar"></div>

  <div class="page">
    <a class="back-link" href="index.html">← All Locations</a>

    <div class="page-header">
      <h1 id="loc-name">Calendar</h1>
      <p>Green = complete · Red = incomplete or not submitted</p>
    </div>

    <div class="subnav">
      <a id="checklist-link" href="#">Today's Checklist</a>
      <a href="#" class="active">Calendar View</a>
      <a id="history-link" href="#">History</a>
    </div>

    <div class="calendar-nav">
      <button class="btn btn-outline btn-sm" id="prev-btn" onclick="changeMonth(-1)">‹ Prev</button>
      <div class="calendar-month" id="month-label"></div>
      <button class="btn btn-outline btn-sm" id="next-btn" onclick="changeMonth(1)">Next ›</button>
    </div>

    <div id="calendar-container">
      <div class="loading">Loading…</div>
    </div>

    <div style="display:flex;gap:20px;margin-top:20px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--toupee)">
        <div style="width:16px;height:16px;border-radius:4px;background:rgba(51,188,86,0.2);border:1px solid #33BC56"></div> Complete
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--toupee)">
        <div style="width:16px;height:16px;border-radius:4px;background:rgba(249,58,90,0.2);border:1px solid #F93A5A"></div> Incomplete / Not Submitted
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--toupee)">
        <div style="width:16px;height:16px;border-radius:4px;background:rgba(74,130,255,0.15);border:1px solid #4A82FF"></div> Today
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    let locationId, currentYear, currentMonth, submissionCache = {};

    async function load() {
      locationId = getParam('id');
      if (!locationId) { window.location = 'index.html'; return; }

      document.getElementById('checklist-link').href = `checklist.html?id=${locationId}`;
      document.getElementById('history-link').href = `history.html?id=${locationId}`;

      const { data: loc } = await db.from('locations').select('name').eq('id', locationId).single();
      document.getElementById('loc-name').textContent = (loc?.name || '') + ' – Calendar';
      document.title = `${loc?.name} Calendar – GBGS`;

      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();

      await fetchMonthData();
      renderCalendar();
    }

    async function fetchMonthData() {
      const firstDay = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-01`;
      const lastDay = new Date(currentYear, currentMonth + 1, 0);
      const lastDayStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(lastDay.getDate()).padStart(2, '0')}`;

      const { data: subs } = await db.from('submissions')
        .select('date, completed, completed_count, total_tasks')
        .eq('location_id', locationId)
        .gte('date', firstDay)
        .lte('date', lastDayStr);

      submissionCache = {};
      (subs || []).forEach(s => { submissionCache[s.date] = s; });
    }

    function renderCalendar() {
      const today = todayDate();
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('month-label').textContent = `${monthNames[currentMonth]} ${currentYear}`;

      const firstDayOfMonth = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

      const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      let html = '<div class="cal-grid">';

      dayLabels.forEach(d => {
        html += `<div class="cal-day-label">${d}</div>`;
      });

      for (let i = 0; i < firstDayOfMonth; i++) {
        html += '<div class="cal-day empty"></div>';
      }

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const sub = submissionCache[dateStr];
        const isToday = dateStr === today;
        const isPast = dateStr < today;

        let cls = 'cal-day';
        let icon = '';

        if (isToday) {
          cls += ' today';
          if (sub?.completed) { cls = 'cal-day complete'; icon = '<div class="cal-icon">✓</div>'; }
          else if (sub) { cls += ' today'; icon = ''; }
          else { cls += ''; }
        } else if (isPast) {
          if (sub?.completed) {
            cls += ' complete';
            icon = '<div class="cal-icon">✓</div>';
          } else {
            cls += ' incomplete';
            icon = '<div class="cal-icon">✗</div>';
          }
        } else {
          cls += ' future';
        }

        const tooltip = sub
          ? (sub.completed ? `Completed` : `${sub.completed_count}/${sub.total_tasks} tasks done`)
          : (isPast ? 'Not submitted' : '');

        html += `<div class="${cls}" title="${tooltip}"><span>${day}</span>${icon}</div>`;
      }

      html += '</div>';
      document.getElementById('calendar-container').innerHTML = html;

      const now = new Date();
      document.getElementById('next-btn').disabled =
        currentYear === now.getFullYear() && currentMonth === now.getMonth();
    }

    async function changeMonth(dir) {
      currentMonth += dir;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      document.getElementById('calendar-container').innerHTML = '<div class="loading">Loading…</div>';
      await fetchMonthData();
      renderCalendar();
    }

    load();
  </script>
</body>
</html>
